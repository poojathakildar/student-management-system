name: DevOps Portal CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-assurance:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Project Stack
        run: |
          python -m pip install --upgrade pip
          pip install flask pandas flake8 safety

      - name: Security Vulnerability Scan
        run: safety check || echo "Warning: vulnerabilities found"

      - name: Syntax & Lint Check
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Backend Integration Test
        run: |
          python -c "import app; client = app.app.test_client(); r = client.get('/'); print(r.status_code); exit(0 if r.status_code == 200 else 1)"

  deployment-simulation:
    name: Simulate Production Deployment
    needs: quality-assurance
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Build
        run: echo '🚀 Build passed. Ready for deployment.'