name: DevOps Portal CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-assurance:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pandas flake8 safety

      - name: Security Scan
        run: safety check || echo "⚠ Vulnerabilities detected"

      - name: Lint Code
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Backend Test
        run: |
          echo "import app" > test.py
          echo "client = app.app.test_client()" >> test.py
          echo "response = client.get('/')" >> test.py
          echo "print('Status:', response.status_code)" >> test.py
          echo "exit(0 if response.status_code == 200 else 1)" >> test.py
          python test.py

  deployment-simulation:
    name: Deployment Simulation
    needs: quality-assurance
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Status
        run: echo "🚀 Build passed successfully. Ready for deployment."